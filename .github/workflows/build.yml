name: Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Utilities.Common/Utilities.Common.csproj

      - name: Build
        run: dotnet build src/Utilities.Common/Utilities.Common.csproj --configuration Release --no-restore --output artifacts/build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Utilities.Common
          path: artifacts/build/